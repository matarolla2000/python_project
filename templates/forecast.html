<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forecast</title>
</head>
<body>
    <form method="POST" action="{{ url_for('get_forecast') }}">
     Город: <input type="text"
                  name="city"><br>
    <input type="submit" value="Узнать прогноз погоды">

    {% if temperature > 20 %}
    <p>{{ forecast }} ☀️</p>
    {% elif temperature < 10 %}
    <p>{{ forecast }} ❄️</p>
    {% else %}
    <p>{{ forecast }}</p>
    {% endif %}
</form>

{% if error > 0 %}
<form method="post" action="{{ url_for('submit_feedback') }}">
    Ваше имя: <input type="text" name="name"><br>
    Опишите проблему: <input type="text" name="problem"><br>
    <input type="submit" value="Отправить фидбэк">
</form>
{% endif %}

<a href="{{ url_for('index') }}">
        <input type="submit" value="Вернуться в главное меню">
</a>
</body>
</html>
